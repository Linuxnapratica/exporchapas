<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Construção | Novidades em Breve</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        /* Efeito de Vidro Fosco (Glassmorphism) */
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px rgba(255, 255, 255, 0.1) solid;
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .badge {
            background: rgba(129, 140, 248, 0.15);
            color: #a5b4fc;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 15px;
            color: #ffffff;
        }

        p {
            color: #94a3b8;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* Redes Sociais */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s ease;
            border: 1px rgba(255, 255, 255, 0.05) solid;
        }

        .social-icon:hover {
            background: #818cf8;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(129, 140, 248, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Sua Marca</div>
        
        <span class="badge">EM BREVE</span>
        
        <h1>Algo incrível está a caminho</h1>
        
        <p>Estamos a trabalhar nos bastidores para criar uma experiência digital totalmente nova. Siga as nossas redes para acompanhar as novidades.</p>
        
        <div class="social-links">
            <a href="https://instagram.com/seu_usuario" target="_blank" class="social-icon" title="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://wa.me/seunumerodowhatsapp" target="_blank" class="social-icon" title="WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="mailto:seuemail@dominio.com" class="social-icon" title="E-mail">
                <i class="far fa-envelope"></i>
            </a>
        </div>
    </div>

</body>
</html>
